<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffdde1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating hearts background animation */
        .heart-bg {
            position: absolute;
            font-size: 30px;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(10deg);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff1744;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .emoji-header {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .question {
            font-size: 1.8em;
            color: #d81b60;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 100px;
        }

        button {
            padding: 20px 50px;
            font-size: 1.5em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c86dd7 100%);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.5);
        }

        #noBtn {
            background: linear-gradient(135deg, #a8a8a8 0%, #7d7d7d 100%);
            color: white;
            position: absolute;
            transition: none;
        }

        .success-message {
            display: none;
            font-size: 2.5em;
            color: #ff1744;
            margin-top: 30px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff1744;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Floating hearts background -->
    <div class="heart-bg" style="left: 10%; top: 10%;">❤️</div>
    <div class="heart-bg" style="left: 80%; top: 20%; animation-delay: 1s;">💕</div>
    <div class="heart-bg" style="left: 15%; top: 70%; animation-delay: 2s;">💖</div>
    <div class="heart-bg" style="left: 85%; top: 60%; animation-delay: 3s;">💗</div>
    <div class="heart-bg" style="left: 50%; top: 80%; animation-delay: 1.5s;">💝</div>
    <div class="heart-bg" style="left: 30%; top: 30%; animation-delay: 2.5s;">💘</div>

    <div class="container">
        <div class="emoji-header">💝 💖 💝</div>
        <h1>Tyler!</h1>
        <div class="question">Will you be my Valentine? 🌹</div>
        
        <div class="button-container">
            <button id="yesBtn">Yes! 💕</button>
            <button id="noBtn">No 😢</button>
        </div>

        <div class="success-message" id="successMessage">
            🎉 Yay! I love you so much! 💕💕💕<br>
            <span style="font-size: 0.6em;">❤️ Happy Valentine's Day! ❤️</span>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const container = document.querySelector('.button-container');
        const successMessage = document.getElementById('successMessage');
        
        // Get button dimensions and container boundaries
        function getRandomPosition() {
            const containerRect = container.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            // Calculate available space
            const maxX = containerRect.width - btnWidth;
            const maxY = containerRect.height - btnHeight;
            
            // Generate random position within container
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            return { x: randomX, y: randomY };
        }

        // Move button when mouse gets close
        noBtn.addEventListener('mouseover', () => {
            const pos = getRandomPosition();
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
        });

        // Try to click no (make it extra hard)
        noBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const pos = getRandomPosition();
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
        });

        // Yes button - show success message
        yesBtn.addEventListener('click', () => {
            container.style.display = 'none';
            successMessage.style.display = 'block';
            createConfetti();
        });

        // Create confetti effect
        function createConfetti() {
            const colors = ['#ff1744', '#ff6b9d', '#ffc1cc', '#ff69b4', '#ff1493'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(confetti);
                    
                    // Remove confetti after animation completes
                    confetti.addEventListener('animationend', () => confetti.remove());
                }, i * 30);
            }
        }

        // Set initial random position for no button
        window.addEventListener('load', () => {
            const pos = getRandomPosition();
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
        });
    </script>
</body>
</html>
